<svg viewBox="0 0 760 190" xmlns="http://www.w3.org/2000/svg" font-family="'Inter', system-ui, -apple-system, sans-serif">
  <style>
    .ttl { font-size: 15px; font-weight: 700; fill: #1f2a37; }
    .lb  { font-size: 12px; font-weight: 600; fill: #1f2a37; }
    .vl  { font-size: 12px; fill: #4a5560; }
    .cv  { font-size: 12px; fill: #8a94a3; }
  </style>
  <rect x="0" y="0" width="760" height="190" rx="16" fill="#f4f6f9"/>
  <text x="24" y="34" class="ttl">Controls</text>

  <!-- Row 1 -->
  <g>
    <text x="24" y="66" class="lb">Start</text>
    <rect x="24" y="74" width="160" height="30" rx="6" fill="#ffffff" stroke="#cfd6de"/>
    <text x="34" y="94" class="vl">2026/01/01</text><text x="174" y="94" class="cv" text-anchor="end">▾</text>

    <text x="200" y="66" class="lb">End</text>
    <rect x="200" y="74" width="160" height="30" rx="6" fill="#ffffff" stroke="#cfd6de"/>
    <text x="210" y="94" class="vl">2026/07/05</text><text x="350" y="94" class="cv" text-anchor="end">▾</text>

    <text x="376" y="66" class="lb">Domain</text>
    <rect x="376" y="74" width="160" height="30" rx="6" fill="#ffffff" stroke="#cfd6de"/>
    <text x="386" y="94" class="vl">All</text><text x="526" y="94" class="cv" text-anchor="end">▾</text>

    <text x="552" y="66" class="lb">Product</text>
    <rect x="552" y="74" width="160" height="30" rx="6" fill="#ffffff" stroke="#cfd6de"/>
    <text x="562" y="94" class="vl">All</text><text x="702" y="94" class="cv" text-anchor="end">▾</text>
  </g>

  <!-- Row 2 -->
  <g>
    <text x="24" y="132" class="lb">Contact type</text>
    <rect x="24" y="140" width="160" height="30" rx="6" fill="#ffffff" stroke="#cfd6de"/>
    <text x="34" y="160" class="vl">All</text><text x="174" y="160" class="cv" text-anchor="end">▾</text>

    <text x="200" y="132" class="lb">Plant</text>
    <rect x="200" y="140" width="160" height="30" rx="6" fill="#ffffff" stroke="#cfd6de"/>
    <text x="210" y="160" class="vl">All</text><text x="350" y="160" class="cv" text-anchor="end">▾</text>

    <text x="376" y="132" class="lb">Unit class</text>
    <rect x="376" y="140" width="160" height="30" rx="6" fill="#ffffff" stroke="#cfd6de"/>
    <text x="386" y="160" class="vl">All</text><text x="526" y="160" class="cv" text-anchor="end">▾</text>
  </g>
</svg>
