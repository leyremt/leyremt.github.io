<svg viewBox="0 0 760 360" xmlns="http://www.w3.org/2000/svg" font-family="'Inter', system-ui, -apple-system, sans-serif">
  <style>
    .ttl { font-size: 16px; font-weight: 700; fill: #1f2a37; }
    .ax  { font-size: 10px; fill: #6b7280; }
    .pc  { font-size: 11px; font-weight: 700; fill: #7a5aa0; }
    .yl  { font-size: 11px; fill: #6b7280; }
  </style>
  <rect x="0" y="0" width="760" height="360" rx="16" fill="#f4f6f9"/>
  <text x="28" y="36" class="ttl">Incident hours &amp; cumulative impact (%) per application</text>

  <!-- axes -->
  <line x1="60" y1="300" x2="726" y2="300" stroke="#cfd6de"/>
  <text x="52" y="90" class="yl" text-anchor="end">xxxxx</text>
  <text x="52" y="300" class="yl" text-anchor="end">0</text>
  <text x="736" y="90" class="yl">100%</text>

  <!-- bars (descending) -->
  <g fill="#7fa0b2">
    <rect x="66"  y="100" width="42" height="200"/>
    <rect x="132" y="180" width="42" height="120"/>
    <rect x="198" y="230" width="42" height="70"/>
    <rect x="264" y="245" width="42" height="55"/>
    <rect x="330" y="255" width="42" height="45"/>
    <rect x="396" y="262" width="42" height="38"/>
    <rect x="462" y="270" width="42" height="30"/>
    <rect x="528" y="276" width="42" height="24"/>
    <rect x="594" y="282" width="42" height="18"/>
    <rect x="660" y="288" width="42" height="12"/>
  </g>

  <!-- cumulative line -->
  <polyline fill="none" stroke="#7a5aa0" stroke-width="2.5"
    points="87,232 153,180 219,150 285,132 351,120 417,110 483,103 549,98 615,94 681,90"/>
  <g fill="#7a5aa0">
    <circle cx="87" cy="232" r="3.5"/><circle cx="153" cy="180" r="3.5"/><circle cx="219" cy="150" r="3.5"/>
    <circle cx="285" cy="132" r="3.5"/><circle cx="351" cy="120" r="3.5"/><circle cx="417" cy="110" r="3.5"/>
    <circle cx="483" cy="103" r="3.5"/><circle cx="549" cy="98" r="3.5"/><circle cx="615" cy="94" r="3.5"/><circle cx="681" cy="90" r="3.5"/>
  </g>
  <text x="87" y="222" class="pc" text-anchor="middle">xx%</text>
  <text x="285" y="122" class="pc" text-anchor="middle">xx%</text>
  <text x="681" y="80" class="pc" text-anchor="middle">xx%</text>

  <!-- x labels -->
  <g class="ax" text-anchor="middle" fill="#6b7280">
    <text x="87" y="316">App 1</text>
    <text x="153" y="316">App 2</text>
    <text x="219" y="316">App 3</text>
    <text x="285" y="316">App 4</text>
    <text x="351" y="316">App 5</text>
    <text x="417" y="316">App 6</text>
    <text x="483" y="316">App 7</text>
    <text x="549" y="316">App 8</text>
    <text x="615" y="316">App 9</text>
    <text x="681" y="316">App 10</text>
  </g>
</svg>
